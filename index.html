<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radius Bar Custom Generator - Screen UI with Dryness Logic</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
  <style>
    :root {
      --bg: #8b1512;
      --fg: #fff;
      --ui-font: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      --slider-track: rgba(255,255,255,0.18);
      --control-w: 175px;
      --left-x: 24px;
      --top-y: 24px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--fg);
      font-family: var(--ui-font);
    }

    #app {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: var(--bg);
    }

    #canvasWrap,
    #uiLayer {
      position: absolute;
      inset: 0;
    }

    #uiLayer {
      pointer-events: none;
    }

    .left-column {
      position: absolute;
      left: var(--left-x);
      top: var(--top-y);
      width: var(--control-w);
      display: flex;
      flex-direction: column;
      gap: 26px;
      z-index: 10;
      pointer-events: auto;
    }

    .control-block {
      width: var(--control-w);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .block-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .subrow {
      width: var(--control-w);
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      line-height: 1;
    }

    .text-input {
      width: var(--control-w);
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--fg);
      color: var(--fg);
      font: 300 22px/1.15 var(--ui-font);
      text-transform: uppercase;
      outline: none;
      padding: 2px 0 4px;
      border-radius: 0;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: var(--control-w);
      height: 12px;
      border-radius: 999px;
      background: var(--slider-track);
      outline: none;
      border: none;
      margin: 0;
      padding: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--fg);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    }

    input[type="range"]::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--fg);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 1px rgba(0,0,0,0.25);
    }

.derived-slider {
  opacity: 0.72;
  cursor: not-allowed;
}

.derived-slider:disabled {
  background: rgba(200,200,200,0.38);
}

.derived-slider::-webkit-slider-thumb {
  background: #b5b5b5;
  cursor: not-allowed;
  box-shadow: none;
}

.derived-slider::-moz-range-thumb {
  background: #b5b5b5;
  cursor: not-allowed;
  box-shadow: none;
}

.derived-slider:disabled::-webkit-slider-thumb {
  background: #b5b5b5;
}

.derived-slider:disabled::-moz-range-thumb {
  background: #b5b5b5;
}

    .swatches,
    .radio-list {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .swatch,
    .radio-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.85);
      cursor: pointer;
      position: relative;
      flex: 0 0 auto;
    }

    .swatch.selected::after,
    .radio-dot.selected::after {
      content: "";
      position: absolute;
      inset: 2px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      mix-blend-mode: difference;
    }

    .swatch.white { background: #ffffff; }
    .swatch.black { background: #000000; }
    .swatch.brand { background: linear-gradient(180deg, #f239b6 0%, #50ffc8 100%); }
    .swatch.redbg { background: #8b1512; }
    .swatch.custom { background: linear-gradient(90deg, red, orange, yellow, green, blue, violet); }

    .radio-item {
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
    }

    .radio-dot {
      background: transparent;
    }

    .radio-dot.selected {
      background: var(--fg);
    }

    .radio-dot.selected::after {
      display: none;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      margin-top: 6px;
    }

    .pill-btn {
      appearance: none;
      border: 1px solid var(--fg);
      background: transparent;
      color: var(--fg);
      border-radius: 999px;
      padding: 8px 18px;
      font: 500 13px/1 var(--ui-font);
      cursor: pointer;
      min-width: 96px;
      text-align: center;
    }

    .pill-btn:hover {
      background: rgba(255,255,255,0.08);
    }

    .hidden-picker {
      position: absolute;
      opacity: 0;
      width: 1px;
      height: 1px;
      pointer-events: none;
    }

    @media (max-width: 900px) {
      :root {
        --control-w: 220px;
        --left-x: 16px;
        --top-y: 16px;
      }

      .left-column {
        gap: 22px;
      }

      .block-title {
        font-size: 14px;
      }

      .subrow,
      .radio-item {
        font-size: 14px;
      }

      .text-input {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvasWrap"></div>

    <div id="uiLayer">
      <div class="left-column">
        <div class="control-block">
          <div class="block-title"><span id="bodyLabel">BODY: 53</span></div>
          <div class="subrow"><span>Light</span><span>Bold</span></div>
          <input id="bodyRange" type="range" min="0" max="100" value="53" />
        </div>

        <div class="control-block">
          <div class="block-title"><span id="acidityLabel">ACIDITY: 27</span></div>
          <div class="subrow"><span>Soft</span><span>Crisp</span></div>
          <input id="acidityRange" type="range" min="0" max="100" value="27" />
        </div>

        <div class="control-block">
          <div class="block-title"><span id="tanninLabel">TANNIN: 55</span></div>
          <div class="subrow"><span>Smooth</span><span>Gritty</span></div>
          <input id="tanninRange" type="range" min="0" max="100" value="55" />
        </div>

        <div class="control-block">
          <div class="block-title"><span id="drynessLabel">DRYNESS: 50</span></div>
          <div class="subrow"><span>Open</span><span>Tight</span></div>
          <input id="drynessRange" type="range" min="0" max="100" value="50" />
        </div>

        <div class="control-block">
          <div class="block-title">TEXT</div>
          <input id="textInput" class="text-input" maxlength="1" value="A" />
        </div>

        <div class="control-block">
          <div class="block-title">SIZE</div>
          <input id="sizeRange" type="range" min="120" max="1200" value="800" />
        </div>

        <div class="control-block">
          <div class="block-title">TYPE COLOR</div>
          <div class="swatches">
            <div class="swatch white" data-type-color="white" title="White"></div>
            <div class="swatch black" data-type-color="black" title="Black"></div>
            <div class="swatch brand" data-type-color="neon" title="Neon"></div>
            <div class="swatch custom" id="typeCustomSwatch" data-type-color="custom" title="Custom"></div>
            <input id="typeColorPicker" class="hidden-picker" type="color" value="#50ffc8" />
          </div>
        </div>

        <div class="control-block">
          <div class="block-title">BACKGROUND</div>
          <div class="swatches">
            <div class="swatch white" data-bg-color="white" title="White"></div>
            <div class="swatch black" data-bg-color="black" title="Black"></div>
            <div class="swatch redbg" data-bg-color="brandred" title="#8b1512"></div>
            <div class="swatch custom" id="bgCustomSwatch" data-bg-color="custom" title="Custom"></div>
            <input id="bgColorPicker" class="hidden-picker" type="color" value="#8b1512" />
          </div>
        </div>

        <div class="control-block">
          <div class="block-title">AUTO MOTION</div>
          <div class="radio-list">
            <div class="radio-item" data-auto-motion="off"><div class="radio-dot"></div><span>Off</span></div>
            <div class="radio-item" data-auto-motion="on"><div class="radio-dot"></div><span>On</span></div>
          </div>
        </div>

        <div class="control-block">
          <div class="block-title">BLEND MODE</div>
          <div class="radio-list">
            <div class="radio-item" data-blend="normal"><div class="radio-dot"></div><span>Normal</span></div>
            <div class="radio-item" data-blend="screen"><div class="radio-dot"></div><span>Screen</span></div>
          </div>
        </div>

        <div class="buttons">
          <button id="orderBtn" class="pill-btn">ORDER</button>
          <button id="saveBtn" class="pill-btn">SAVE</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    let font;
    let centers = [];
    let canvas;

    const state = {
      text: 'A',
      size: 800,
      body: 53,
      acidity: 25,
      tannin: 75,
      dryness: 56,
      typeColorMode: 'neon',
      typeCustomColor: '#50ffc8',
      bgMode: 'brandred',
      bgCustomColor: '#8b1512',
      autoMotion: false,
      blend: 'screen',
      drawMode: 'stroke'
    };

    let trackingVal = 40;
    let leadingVal = 80;
    let radiusMin = 12;
    let radiusMax = 90;
    let step = 18;
    let spacing = 70;
    let strokeW = 1.5;
    let rippleAlpha = 255;
    const BASE_SIZE = 800;
    const BASE_TRACKING = 40;
    const BASE_LEADING = 80;

    let breatheOn = false;
    let breatheAmp = 0.06;
    let breatheSpeed = 0.9;

    let trailOn = false;
    let trailAlpha = 18;

    let fizzOn = false;
    let fizzAmp = 1.2;
    let fizzSpeed = 1.4;
    let fizzThreshold = 0.72;

    let waveOn = false;
    let waveAmp = 0.14;
    let waveScale = 0.02;
    let waveSpeed = 1.5;

    let driftOn = false;
    let driftAmp = 0;
    let driftSpeed = 0.95;

    let wobbleOn = false;
    let wobbleAmp = 0;
    let wobbleSpeed = 1.1;

    const ui = {};

    function preload() {
      font = loadFont('Montserrat-VariableFont_wght.ttf');
    }

    function setup() {
      canvas = createCanvas(windowWidth, windowHeight);
      canvas.parent('canvasWrap');
      canvas.position(0, 0);
      canvas.style('display', 'block');
      setupUI();
      recalcAll();
    }

    function draw() {
      renderScene();
    }

    function setupUI() {
      ui.bodyRange = document.getElementById('bodyRange');
      ui.acidityRange = document.getElementById('acidityRange');
      ui.tanninRange = document.getElementById('tanninRange');
      ui.drynessRange = document.getElementById('drynessRange');
      ui.sizeRange = document.getElementById('sizeRange');
      ui.textInput = document.getElementById('textInput');
      ui.bodyLabel = document.getElementById('bodyLabel');
      ui.acidityLabel = document.getElementById('acidityLabel');
      ui.tanninLabel = document.getElementById('tanninLabel');
      ui.drynessLabel = document.getElementById('drynessLabel');
      ui.orderBtn = document.getElementById('orderBtn');
      ui.saveBtn = document.getElementById('saveBtn');
      ui.typeColorPicker = document.getElementById('typeColorPicker');
      ui.bgColorPicker = document.getElementById('bgColorPicker');
      ui.typeSwatches = [...document.querySelectorAll('[data-type-color]')];
      ui.bgSwatches = [...document.querySelectorAll('[data-bg-color]')];
      ui.motionRadios = [...document.querySelectorAll('[data-auto-motion]')];
      ui.blendRadios = [...document.querySelectorAll('[data-blend]')];

      ui.bodyRange.addEventListener('input', () => {
        state.body = Number(ui.bodyRange.value);
        recalcAll();
      });

      ui.acidityRange.addEventListener('input', () => {
        state.acidity = Number(ui.acidityRange.value);
        recalcAll();
      });

      ui.tanninRange.addEventListener('input', () => {
        state.tannin = Number(ui.tanninRange.value);
        recalcAll();
      });

      ui.drynessRange.addEventListener('input', () => {
        state.dryness = Number(ui.drynessRange.value);
        recalcAll();
      });

      ui.sizeRange.addEventListener('input', () => {
        state.size = Number(ui.sizeRange.value);
        recalcAll();
      });

      ui.textInput.addEventListener('focus', () => ui.textInput.select());

      ui.textInput.addEventListener('keydown', (e) => {
        if (/^[a-zA-Z]$/.test(e.key)) {
          e.preventDefault();
          const letter = e.key.toUpperCase();
          ui.textInput.value = letter;
          state.text = letter;
          recalcAll();
        }
      });

      ui.textInput.addEventListener('input', () => {
        const raw = ui.textInput.value.toUpperCase().replace(/[^A-Z]/g, '');
        const cleaned = raw.slice(-1);
        state.text = cleaned || 'A';
        ui.textInput.value = state.text;
        recalcAll();
      });

      ui.typeSwatches.forEach(el => {
        el.addEventListener('click', () => {
          const mode = el.dataset.typeColor;
          if (mode === 'custom') {
            ui.typeColorPicker.click();
          } else {
            state.typeColorMode = mode;
            syncSwatches();
            recalcAll();
          }
        });
      });

      ui.bgSwatches.forEach(el => {
        el.addEventListener('click', () => {
          const mode = el.dataset.bgColor;
          if (mode === 'custom') {
            ui.bgColorPicker.click();
          } else {
            state.bgMode = mode;
            syncSwatches();
            recalcAll();
          }
        });
      });

      ui.typeColorPicker.addEventListener('input', () => {
        state.typeColorMode = 'custom';
        state.typeCustomColor = ui.typeColorPicker.value;
        syncSwatches();
        recalcAll();
      });

      ui.bgColorPicker.addEventListener('input', () => {
        state.bgMode = 'custom';
        state.bgCustomColor = ui.bgColorPicker.value;
        syncSwatches();
        recalcAll();
      });

      ui.motionRadios.forEach(el => {
        el.addEventListener('click', () => {
          state.autoMotion = el.dataset.autoMotion === 'on';
          syncRadios();
          recalcAll();
        });
      });

      ui.blendRadios.forEach(el => {
        el.addEventListener('click', () => {
          state.blend = el.dataset.blend;
          syncRadios();
          recalcAll();
        });
      });

      ui.orderBtn.addEventListener('click', () => recalcAll());
      ui.saveBtn.addEventListener('click', exportSVG);

      syncSwatches();
      syncRadios();
    }

    function syncSwatches() {
      ui.typeSwatches.forEach(el => el.classList.toggle('selected', el.dataset.typeColor === state.typeColorMode));
      ui.bgSwatches.forEach(el => el.classList.toggle('selected', el.dataset.bgColor === state.bgMode));
    }

    function syncRadios() {
      ui.motionRadios.forEach(el => {
        const active = (el.dataset.autoMotion === 'on') === state.autoMotion;
        el.querySelector('.radio-dot').classList.toggle('selected', active);
      });
      ui.blendRadios.forEach(el => {
        const active = el.dataset.blend === state.blend;
        el.querySelector('.radio-dot').classList.toggle('selected', active);
      });
    }

    function recalcAll() {
      applyAxesToParams();
      applyMotionFromAxes();
      buildAllText();
      syncLabels();
    }

    function syncLabels() {
      ui.bodyLabel.textContent = `BODY: ${state.body}`;
      ui.acidityLabel.textContent = `ACIDITY: ${state.acidity}`;
      ui.tanninLabel.textContent = `TANNIN: ${state.tannin}`;
      ui.drynessLabel.textContent = `DRYNESS: ${state.dryness}`;
      ui.drynessRange.value = state.dryness;

      document.documentElement.style.setProperty('--bg', getBackgroundHex());
      document.documentElement.style.setProperty('--fg', needsDarkForeground() ? '#000' : '#fff');
      document.documentElement.style.setProperty('--slider-track', needsDarkForeground() ? 'rgba(0,0,0,0.14)' : 'rgba(255,255,255,0.18)');
    }

    function applyAxesToParams() {
      let bodyN = state.body / 100;
      let acidN = state.acidity / 100;
      let tanN = state.tannin / 100;
      let dryN = state.dryness / 100;

      strokeW = lerp(1.15, 2.8, bodyN);
      rippleAlpha = lerp(210, 255, bodyN);

let acidSoft = pow(acidN, 1.12);

radiusMin = floor(lerp(10, 15, 1 - acidN));
radiusMax = floor(55 + acidSoft * 78);

spacing = floor(lerp(150, 42, tanN));      
      
step = floor(lerp(40, 4, dryN));
      autoScaleByTextSize();
    }

    function autoScaleByTextSize() {
      let s = state.size / BASE_SIZE;
      trackingVal = Math.round(BASE_TRACKING * s);
      leadingVal = Math.round(BASE_LEADING * s);
      strokeW *= s;
      radiusMin = Math.max(2, Math.round(radiusMin * s));
      radiusMax = Math.max(radiusMin + 10, Math.round(radiusMax * s));
      step = Math.max(4, Math.round(step * s));
      spacing = Math.max(6, Math.round(spacing * s));
    }

    function applyMotionFromAxes() {
      breatheOn = false;
      trailOn = false;
      fizzOn = false;
      waveOn = false;
      driftOn = false;
      wobbleOn = false;

      state.drawMode = 'stroke';
      if (!state.autoMotion) return;

      const b = state.body / 100;
      const a = state.acidity / 100;
      const t = state.tannin / 100;
      const alcohol = constrain(0.68 * state.body + 0.32 * (100 - state.acidity), 0, 100) / 100;

      breatheOn = true;
      breatheAmp = lerp(0.05, 0.12, b);
      breatheSpeed = lerp(1.7, 0.95, b);

      trailOn = true;
      trailAlpha = Math.round(lerp(20, 10, b));

      if (state.acidity > 68) {
        fizzOn = true;
        fizzAmp = lerp(1.0, 2.8, a);
        fizzSpeed = lerp(1.1, 2.6, a);
        fizzThreshold = lerp(0.82, 0.62, a);
      }

      if (state.acidity > 52) {
        waveOn = true;
        waveAmp = lerp(0.10, 0.22, a);
        waveScale = lerp(0.014, 0.032, a);
        waveSpeed = lerp(1.1, 2.2, a);
      }

      if (state.tannin > 65) {
        driftOn = true;
        driftAmp = lerp(5.0, 9.8, t);
        driftSpeed = lerp(1.05, 0.9, t);
      }

      if (alcohol * 100 > 58) {
        wobbleOn = true;
        wobbleAmp = lerp(5.0, 9.8, alcohol);
        wobbleSpeed = lerp(1.0, 1.2, alcohol);
      }
    }

    function buildAllText() {
      centers = [];
      buildBlockText();
      centerAlignCenters();
    }

    function buildBlockText() {
      const fontSize = state.size;
      const lines = state.text.toUpperCase().split('\n');
      const allCenters = [];
      let glyphCounter = 0;

      textFont(font);
      textSize(fontSize);

      for (let li = 0; li < lines.length; li++) {
        const line = lines[li];
        let cursorX = 0;
        let cursorY = li * (fontSize + leadingVal);

        for (let i = 0; i < line.length; i++) {
          const ch = line[i];

          if (ch === ' ') {
            cursorX += textWidth(' ') + trackingVal;
            glyphCounter++;
            continue;
          }

          const info = getGlyphPoints(ch, fontSize);
          if (!info) {
            glyphCounter++;
            continue;
          }

          const originX = cursorX;
          const originY = cursorY;
          const snappedPts = [];
          let minLX = Infinity;
          let maxLX = -Infinity;

          for (let p of info.pts) {
            const sx = Math.round(p.x / spacing) * spacing;
            const sy = Math.round(p.y / spacing) * spacing;
            snappedPts.push({ x: sx, y: sy });
            minLX = min(minLX, sx);
            maxLX = max(maxLX, sx);
          }

          if (!snappedPts.length) {
            glyphCounter++;
            continue;
          }

          const shiftX = -minLX;
          for (let sp of snappedPts) {
            const gx = originX + sp.x + shiftX;
            const gy = originY + sp.y;
            addSnappedPointWorld(allCenters, gx, gy, glyphCounter);
          }

          const snappedW = (maxLX > minLX) ? (maxLX - minLX) : 0;
          const adv = Math.max(textWidth(ch), snappedW);
          cursorX += adv + trackingVal;
          glyphCounter++;
        }
      }

      centers = allCenters;
    }

    function addSnappedPointWorld(allCenters, sx, sy, gIndex) {
      for (let q of allCenters) {
        if (q.gIndex === gIndex && dist(sx, sy, q.x, q.y) < spacing * 0.4) return;
      }
      let v = createVector(sx, sy);
      v.gIndex = gIndex;
      allCenters.push(v);
    }

    function getGlyphPoints(ch, fontSize) {
      let bounds = font.textBounds(ch, 0, 0, fontSize);
      if (!bounds) return null;

      let x0 = -bounds.w / 2 - bounds.x;
      let y0 = bounds.h / 2 - bounds.y;
      let pts = font.textToPoints(ch, x0, y0, fontSize, { sampleFactor: 0.58 });
      return { pts, width: bounds.w };
    }

    function centerAlignCenters() {
      if (!centers.length) return;

      let minX = Infinity, minY = Infinity;
      let maxX = -Infinity, maxY = -Infinity;

      for (let c of centers) {
        minX = min(minX, c.x);
        minY = min(minY, c.y);
        maxX = max(maxX, c.x);
        maxY = max(maxY, c.y);
      }

      const centerX = width * 0.51;
      const centerY = height * 0.51;
      
      const dx = centerX - (minX + maxX) / 2;
      const dy = centerY - (minY + maxY) / 2;

      for (let c of centers) {
        c.x += dx;
        c.y += dy;
      }
    }

    function renderScene() {
      const bg = color(getBackgroundHex());
      blendMode(BLEND);

      if (state.autoMotion && trailOn) {
        noStroke();
        fill(red(bg), green(bg), blue(bg), trailAlpha);
        rect(0, 0, width, height);
      } else {
        background(bg);
      }

      let modeConst = BLEND;
      if (state.blend === 'screen') modeConst = SCREEN;
      blendMode(modeConst);

      for (let c of centers) drawRipple(c, 1);
    }

    function drawRipple(pt, progress) {
      let cx = pt.x;
      let cy = pt.y;
      let gIndex = pt.gIndex || 0;
      let time = millis() * 0.001;
      let p = progress;

      if (state.autoMotion && waveOn) {
        let w = sin((pt.x + pt.y) * waveScale + time * waveSpeed) * waveAmp;
        p = constrain(p + w, 0, 1);
      }

      if (state.autoMotion && wobbleOn) {
        let ox = (noise(cx * 0.01, cy * 0.01, time * wobbleSpeed) - 0.5) * 2 * wobbleAmp;
        let oy = (noise(cx * 0.01 + 99, cy * 0.01 + 99, time * wobbleSpeed) - 0.5) * 2 * wobbleAmp;
        cx += ox;
        cy += oy;
      }

      const drynessBias = lerp(1.35, 0.72, state.dryness / 100);

      for (let r = radiusMin; r <= radiusMax; r += step) {
        let t = (r - radiusMin) / max(1, (radiusMax - radiusMin));
        let visible = t <= p;
        if (!visible) continue;

        let col = getColorForRipple(t);
        let alpha = rippleAlpha;
        let sw = strokeW;
        let rr = r * drynessBias;

        if (state.autoMotion && breatheOn) {
          let b = 1 + sin(time * breatheSpeed + gIndex * 0.3) * breatheAmp;
          rr *= b;
        }

        if (state.autoMotion && fizzOn) {
          let ringIndex = floor((r - radiusMin) / max(1, step));
          let n = noise(gIndex * 0.21, ringIndex * 0.23, time * fizzSpeed);
          let pulse = (n > fizzThreshold)
            ? (n - fizzThreshold) / max(0.0001, (1 - fizzThreshold))
            : 0;
          rr += pulse * fizzAmp * step;
        }

        let dx = 0, dy = 0;
        if (state.autoMotion && driftOn) {
          let ringIndex = floor((r - radiusMin) / max(1, step));
          let drift = sin(time * driftSpeed + ringIndex * 0.6 + gIndex * 0.2) * driftAmp;
          dx = drift;
          dy = -drift * 0.6;
        }

        if (state.drawMode === 'fill') {
          noStroke();
          fill(col[0], col[1], col[2], alpha);
        } else {
          noFill();
          stroke(col[0], col[1], col[2], alpha);
          strokeWeight(sw);
        }

        ellipse(cx + dx, cy + dy, rr * 2, rr * 2);
      }
    }

    function getColorForRipple(t) {
      if (state.typeColorMode === 'white') return [255, 255, 255];
      if (state.typeColorMode === 'black') return [0, 0, 0];
      if (state.typeColorMode === 'custom') {
        const c = hexToRgb(state.typeCustomColor);
        return [c.r, c.g, c.b];
      }

      let tt = constrain(t, 0, 1);
      return [lerp(80, 255, tt), lerp(255, 40, tt), lerp(200, 180, tt)];
    }

    function getBackgroundHex() {
      if (state.bgMode === 'white') return '#ffffff';
      if (state.bgMode === 'black') return '#000000';
      if (state.bgMode === 'custom') return state.bgCustomColor;
      return '#8b1512';
    }

    function needsDarkForeground() {
      const c = hexToRgb(getBackgroundHex());
      const luminance = (0.299 * c.r + 0.587 * c.g + 0.114 * c.b) / 255;
      return luminance > 0.72;
    }

    function exportSVG() {
      const svgText = buildSVGString();
      downloadTextAsFile(svgText, 'radius_generator_dryness_left_ui.svg', 'image/svg+xml;charset=utf-8');
    }

    function buildSVGString() {
      const w = width;
      const h = height;
      let parts = [];
      const bgHex = getBackgroundHex();

      parts.push(`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">`);
      parts.push(`<rect x="0" y="0" width="${w}" height="${h}" fill="${bgHex}"/>`);

      for (let c of centers) {
        parts.push(...rippleToSVGElements(c, 1));
      }

      parts.push(`</svg>`);
      return parts.join('');
    }

    function rippleToSVGElements(pt, progress) {
      const cx = pt.x;
      const cy = pt.y;
      let els = [];

      const drynessBias = lerp(1.35, 0.72, state.dryness / 100);

      for (let r = radiusMin; r <= radiusMax; r += step) {
        const t = (r - radiusMin) / max(1, (radiusMax - radiusMin));
        if (t > progress) continue;

        const col = getColorForRipple(t);
        const hex = rgbToHex(col[0], col[1], col[2]);
        const a = constrain(rippleAlpha, 0, 255) / 255;
        const rr = r * drynessBias;

        if (state.drawMode === 'fill') {
          els.push(`<circle cx="${cx}" cy="${cy}" r="${rr}" fill="${hex}" fill-opacity="${a}" stroke="none" />`);
        } else {
          els.push(`<circle cx="${cx}" cy="${cy}" r="${rr}" fill="none" stroke="${hex}" stroke-opacity="${a}" stroke-width="${strokeW}" vector-effect="non-scaling-stroke" />`);
        }
      }
      return els;
    }

    function downloadTextAsFile(text, filename, mime) {
      const blob = new Blob([text], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }, 0);
    }

    function rgbToHex(r, g, b) {
      const rr = clamp255(Math.round(r));
      const gg = clamp255(Math.round(g));
      const bb = clamp255(Math.round(b));
      return '#' + [rr, gg, bb].map(v => v.toString(16).padStart(2, '0')).join('');
    }

    function clamp255(v) {
      return Math.max(0, Math.min(255, v));
    }

    function hexToRgb(hex) {
      const clean = hex.replace('#', '');
      const bigint = parseInt(clean, 16);
      return {
        r: (bigint >> 16) & 255,
        g: (bigint >> 8) & 255,
        b: bigint & 255,
      };
    }

    function windowResized() {
      resizeCanvas(windowWidth, windowHeight);
      buildAllText();
    }
  </script>
</body>
</html>
